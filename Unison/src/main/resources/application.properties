spring.application.name=Unison
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/unison}
unison.frontend-base-url=${UNISON_FRONTEND_BASE_URL:http://localhost:5173}
unison.bootstrap-admin.enabled=${UNISON_BOOTSTRAP_ADMIN_ENABLED:false}
unison.bootstrap-admin.email=${UNISON_BOOTSTRAP_ADMIN_EMAIL:}
unison.bootstrap-admin.expires-hours=${UNISON_BOOTSTRAP_ADMIN_EXPIRES_HOURS:24}
unison.notifications.reminder-window-minutes=${UNISON_NOTIFICATION_REMINDER_WINDOW_MINUTES:30}
unison.notifications.reminder-rate-ms=${UNISON_NOTIFICATION_REMINDER_RATE_MS:300000}
